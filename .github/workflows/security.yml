name: security-audit

# Runs the dependency security audit on every push/PR, and on a daily schedule
# so newly-disclosed CVEs in already-pinned dependencies get caught even when no
# code changes ("hackers break things all the time").
on:
  push:
  pull_request:
  schedule:
    - cron: "0 13 * * *"   # daily at 13:00 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install runtime + audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run security audit
        run: ./scripts/security_audit.sh
